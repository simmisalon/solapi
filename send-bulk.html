<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS 대량 발송</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-lg">
    <h1 class="text-xl font-bold text-gray-800 mb-6">SMS 대량 발송</h1>

    <div class="space-y-5">

      <!-- 관리자 토큰 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">관리자 토큰</label>
        <input
          id="adminToken"
          type="password"
          placeholder="ADMIN_TOKEN"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          autocomplete="current-password"
        />
        <p class="text-xs text-gray-400 mt-1">첫 발송 후 이 브라우저에 저장됩니다.</p>
      </div>

      <!-- 파일 업로드 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">수신자 파일 업로드</label>
        <div
          id="dropZone"
          onclick="document.getElementById('fileInput').click()"
          class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center cursor-pointer hover:border-indigo-400 transition-colors"
        >
          <p class="text-sm text-gray-500">엑셀(.xlsx) 또는 CSV 파일을 올려주세요</p>
          <p class="text-xs text-gray-400 mt-1">클릭하거나 파일을 여기에 드래그하세요</p>
        </div>
        <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="handleFile(event)" />
        <p class="text-xs text-gray-400 mt-1">※ 전화번호가 있는 열을 자동으로 찾아서 추출합니다</p>
      </div>

      <!-- 번호 미리보기 -->
      <div id="previewSection" class="hidden">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          추출된 수신번호 <span id="countBadge" class="text-indigo-600 font-bold"></span>
        </label>
        <div id="preview" class="border border-gray-200 rounded-lg p-3 text-sm text-gray-600 max-h-36 overflow-y-auto bg-gray-50 space-y-1"></div>
      </div>

      <!-- 메시지 -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">메시지 내용</label>
        <textarea
          id="text"
          rows="4"
          placeholder="보낼 메시지를 입력하세요"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
        ></textarea>
        <p class="text-xs text-gray-400 mt-1 text-right"><span id="charCount">0</span> / 90자 (초과 시 LMS)</p>
      </div>

      <!-- 광고성 체크 -->
      <div class="rounded-lg border border-amber-200 bg-amber-50 p-3">
        <label class="flex items-start gap-2 cursor-pointer">
          <input id="promotional" type="checkbox" class="mt-0.5" />
          <div class="text-sm">
            <span class="font-medium text-amber-900">광고성 문자</span>
            <p class="text-xs text-amber-700 mt-0.5">
              체크 시 <code>(광고)</code> 접두어와 <code>무료수신거부 080</code>이 자동 삽입되며, 21~08시(KST) 발송이 차단됩니다.
              수신 동의 받은 번호에만 보내세요.
            </p>
          </div>
        </label>
      </div>

      <!-- 발송 버튼 -->
      <button
        id="sendBtn"
        onclick="sendBulk()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 text-white font-medium py-2.5 rounded-lg text-sm transition-colors"
      >
        발송하기
      </button>
    </div>

    <!-- 결과 -->
    <div id="result" class="mt-4 hidden">
      <div id="resultBox" class="rounded-lg px-4 py-3 text-sm"></div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = 'solapi_admin_token';
    let numbers = [];

    const tokenInput = document.getElementById('adminToken');
    tokenInput.value = localStorage.getItem(TOKEN_KEY) || '';

    document.getElementById('text').addEventListener('input', (e) => {
      document.getElementById('charCount').textContent = e.target.value.length;
    });

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-indigo-400'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('border-indigo-400'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('border-indigo-400');
      const file = e.dataTransfer.files[0];
      if (file) parseFile(file);
    });

    function handleFile(event) {
      const file = event.target.files[0];
      if (file) parseFile(file);
    }

    function parseFile(file) {
      const reader = new FileReader();
      const isCSV = file.name.endsWith('.csv');

      reader.onload = (e) => {
        let parsed = [];

        if (isCSV) {
          const text = e.target.result;
          const rows = text.split('\n').map(r => r.split(','));
          parsed = extractNumbers(rows);
        } else {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          parsed = extractNumbers(rows);
        }

        numbers = parsed;
        showPreview();
      };

      if (isCSV) {
        reader.readAsText(file);
      } else {
        reader.readAsArrayBuffer(file);
      }
    }

    function extractNumbers(rows) {
      const results = [];
      const phoneRegex = /^0[0-9]{9,10}$/;

      for (const row of rows) {
        for (const cell of row) {
          const val = String(cell || '').replace(/[-\s]/g, '').trim();
          if (phoneRegex.test(val)) {
            results.push(val);
          }
        }
      }

      return [...new Set(results)];
    }

    function showPreview() {
      const section = document.getElementById('previewSection');
      const preview = document.getElementById('preview');
      const badge = document.getElementById('countBadge');

      section.classList.remove('hidden');
      badge.textContent = `(${numbers.length}명)`;
      preview.innerHTML = numbers.map(n => `<div>${n}</div>`).join('');
    }

    async function sendBulk() {
      const token = tokenInput.value.trim();
      const text = document.getElementById('text').value.trim();
      const promotional = document.getElementById('promotional').checked;
      const btn = document.getElementById('sendBtn');
      const result = document.getElementById('result');
      const resultBox = document.getElementById('resultBox');

      if (!token) { alert('관리자 토큰을 입력해 주세요.'); return; }
      if (numbers.length === 0) { alert('파일을 먼저 업로드해 주세요.'); return; }
      if (!text) { alert('메시지를 입력해 주세요.'); return; }

      if (promotional && !confirm(`광고성 문자를 ${numbers.length}명에게 발송합니다. 수신 동의 받은 번호들이 맞습니까?`)) return;

      btn.disabled = true;
      btn.textContent = `${numbers.length}명에게 발송 중...`;

      try {
        const res = await fetch('/api/send-bulk', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-admin-token': token,
          },
          body: JSON.stringify({ numbers, text, promotional }),
        });

        const data = await res.json();
        result.classList.remove('hidden');

        if (data.success) {
          localStorage.setItem(TOKEN_KEY, token);
          resultBox.className = 'rounded-lg px-4 py-3 text-sm bg-green-50 text-green-700 border border-green-200';
          const emailMsg = data.email?.sent ? ' 이메일 리포트 발송됨.' : '';
          resultBox.textContent = `발송 요청 성공! 총 ${data.total}명 전송.${emailMsg}`;
        } else {
          resultBox.className = 'rounded-lg px-4 py-3 text-sm bg-red-50 text-red-700 border border-red-200';
          resultBox.textContent = '발송 실패: ' + (data.error || res.status);
        }
      } catch (e) {
        result.classList.remove('hidden');
        resultBox.className = 'rounded-lg px-4 py-3 text-sm bg-red-50 text-red-700 border border-red-200';
        resultBox.textContent = '오류: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '발송하기';
      }
    }
  </script>
</body>
</html>
