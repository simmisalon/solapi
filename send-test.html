<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS 테스트 발송</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-md">
    <h1 class="text-xl font-bold text-gray-800 mb-6">SMS 테스트 발송</h1>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">수신번호</label>
        <input
          id="to"
          type="tel"
          placeholder="01012345678"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">메시지 내용</label>
        <textarea
          id="text"
          rows="4"
          placeholder="보낼 메시지를 입력하세요"
          class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
        ></textarea>
        <p class="text-xs text-gray-400 mt-1 text-right"><span id="charCount">0</span> / 90자 (초과 시 LMS)</p>
      </div>

      <button
        id="sendBtn"
        onclick="sendSMS()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg text-sm transition-colors"
      >
        발송하기
      </button>
    </div>

    <div id="result" class="mt-4 hidden">
      <div id="resultBox" class="rounded-lg px-4 py-3 text-sm"></div>
    </div>
  </div>

  <script>
    const textArea = document.getElementById('text');
    const charCount = document.getElementById('charCount');

    textArea.addEventListener('input', () => {
      charCount.textContent = textArea.value.length;
    });

    async function sendSMS() {
      const to = document.getElementById('to').value.trim();
      const text = textArea.value.trim();
      const btn = document.getElementById('sendBtn');
      const result = document.getElementById('result');
      const resultBox = document.getElementById('resultBox');

      if (!to || !text) {
        alert('수신번호와 메시지를 모두 입력해 주세요.');
        return;
      }

      btn.disabled = true;
      btn.textContent = '발송 중...';

      try {
        const res = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to, text }),
        });

        const data = await res.json();

        result.classList.remove('hidden');
        if (data.success) {
          resultBox.className = 'rounded-lg px-4 py-3 text-sm bg-green-50 text-green-700 border border-green-200';
          resultBox.textContent = '발송 성공!';
        } else {
          resultBox.className = 'rounded-lg px-4 py-3 text-sm bg-red-50 text-red-700 border border-red-200';
          resultBox.textContent = '발송 실패: ' + data.error;
        }
      } catch (e) {
        result.classList.remove('hidden');
        resultBox.className = 'rounded-lg px-4 py-3 text-sm bg-red-50 text-red-700 border border-red-200';
        resultBox.textContent = '오류: ' + e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = '발송하기';
      }
    }
  </script>
</body>
</html>
